<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Life Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Work Life Dashboard</h1>
            <div class="header-buttons">
                <button id="gmailBtn" class="gmail-btn">
                    <i class="fas fa-envelope"></i> Gmail
                </button>
                <button id="googleSheetsBtn" class="sheets-btn">
                    <i class="fas fa-table"></i> Sheets
                </button>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Expense Tracker -->
            <div class="card">
                <h2><i class="fas fa-receipt"></i> Expense Tracker</h2>
                <form id="expenseForm" class="expense-form">
                    <div class="form-group">
                        <input type="date" id="expenseDate" required>
                        <input type="text" id="receiptName" placeholder="Receipt name" required>
                        <input type="text" id="expensePurpose" placeholder="Purpose" required>
                        <input type="number" id="expenseAmount" placeholder="Amount" step="0.01" required>
                        <input type="file" id="receiptUpload" accept="image/*,.pdf" class="file-input">
                        <label for="receiptUpload" class="file-label">
                            <i class="fas fa-upload"></i> Upload Receipt
                        </label>
                    </div>
                    <button type="submit">Add Expense</button>
                </form>
                <div id="expenseList" class="expense-list"></div>
            </div>

            <!-- Calendar & Meetings -->
            <div class="card">
                <h2><i class="fas fa-calendar"></i> Calendar & Meetings</h2>
                <form id="meetingForm" class="meeting-form">
                    <div class="form-group">
                        <input type="datetime-local" id="meetingDateTime" required>
                        <input type="text" id="meetingTitle" placeholder="Meeting title" required>
                        <input type="text" id="meetingDescription" placeholder="Description">
                    </div>
                    <button type="submit">Add Meeting</button>
                </form>
                <div id="meetingList" class="meeting-list"></div>
            </div>

            <!-- Todo List -->
            <div class="card">
                <h2><i class="fas fa-tasks"></i> Todo List</h2>
                <form id="todoForm" class="todo-form">
                    <div class="form-group">
                        <input type="text" id="todoInput" placeholder="Add new task" required>
                        <select id="todoPriority">
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <button type="submit">Add Task</button>
                </form>
                <div class="progress-section">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <span id="progressText">0% Complete</span>
                </div>
                <div id="todoList" class="todo-list"></div>
            </div>
