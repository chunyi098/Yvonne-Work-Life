<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Approvals — Work Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #FF3B7F; --pink-light: #FFE0ED; --pink-dark: #CC2B66;
      --bg: #f3f3f3; --card: #fff; --border: #e8e8e8;
      --text: #1a1a1a; --text2: #555; --text3: #999;
      --green: #15803d; --green-bg: #ecfdf5;
      --radius: 12px; --radius-md: 8px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header-logo { display: flex; align-items: center; gap: 10px; }
    .logo-dot { width: 32px; height: 32px; border-radius: 9px; background: var(--pink); display: flex; align-items: center; justify-content: center; }
    .logo-dot svg { width: 17px; height: 17px; }
    .header-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .header-sub   { font-size: 12px; color: var(--text3); }
    .badge-count  { background: var(--pink-light); color: var(--pink-dark); font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 999px; }
    .main { max-width: 820px; margin: 0 auto; padding: 24px 16px; }
    .info-banner { background: #fff8e6; border: 1px solid #f5c75a; border-radius: var(--radius-md); padding: 12px 16px; font-size: 13px; color: #8a6200; margin-bottom: 20px; line-height: 1.6; }
    .sync-banner { background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: var(--radius-md); padding: 12px 16px; font-size: 13px; color: #2e7d32; margin-bottom: 20px; display: none; font-weight: 600; }
    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .section-sub   { font-size: 13px; color: var(--text3); margin-bottom: 16px; }
    .expense-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px; transition: opacity 0.3s; }
    .expense-card.paid { opacity: 0.5; }
    .exp-icon { width: 42px; height: 42px; border-radius: 10px; background: var(--pink-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .exp-icon svg { width: 20px; height: 20px; }
    .exp-info { flex: 1; min-width: 0; }
    .exp-name    { font-size: 14px; font-weight: 600; }
    .exp-purpose { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .exp-date    { font-size: 11px; color: var(--text3); margin-top: 3px; }
    .exp-amount  { font-size: 20px; font-weight: 700; text-align: right; flex-shrink: 0; }
    .exp-amount span { display: block; font-size: 11px; font-weight: 400; color: var(--text3); margin-top: 2px; }
    .btn-pay { background: var(--pink); color: white; border: none; border-radius: var(--radius-md); padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .btn-pay:hover { background: var(--pink-dark); }
    .btn-paid { background: var(--green-bg); color: var(--green); border: 1.5px solid #bbf7d0; border-radius: var(--radius-md); padding: 9px 18px; font-size: 13px; font-weight: 600; white-space: nowrap; flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
    .summary-bar { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; display: flex; gap: 32px; }
    .sum-item label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
    .sum-item .val { font-size: 22px; font-weight: 700; }
    .sum-item .val.pink  { color: var(--pink); }
    .sum-item .val.green { color: var(--green); }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a1a; color: white; padding: 10px 20px; border-radius: 999px; font-size: 13px; transition: transform 0.3s; z-index: 999; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="logo-dot"><svg viewBox="0 0 16 16" fill="white"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 2a5 5 0 110 10A5 5 0 018 3zm0 2a3 3 0 100 6 3 3 0 000-6z"/></svg></div>
    <div><div class="header-title">Expense Approvals</div><div class="header-sub">Work Hub — Finance Portal</div></div>
  </div>
  <div class="badge-count" id="pending-badge">Loading...</div>
</div>

<div class="main">
  <div class="sync-banner" id="sync-banner"></div>

  <div class="info-banner">
    <strong>Finance team:</strong> Click <strong>Mark as Paid</strong> on each expense you have processed.
    The employee’s dashboard will <strong>update instantly</strong> if they have it open — no link needed!
  </div>

  <div class="summary-bar">
    <div class="sum-item"><label>Total Pending</label><div class="val pink" id="sum-pending">$0.00</div></div>
    <div class="sum-item"><label>Marked Paid</label><div class="val green" id="sum-paid">$0.00</div></div>
    <div class="sum-item"><label>Expenses</label><div class="val" id="sum-count">0</div></div>
  </div>

  <div class="section-title">Pending Reimbursements</div>
  <div class="section-sub">Expenses awaiting payment</div>
  <div id="expense-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  let expenses = [];
  let paidThisSession = new Set();

  // ---- BroadcastChannel: talk to dashboard tab if open on same browser ----
  let bc = null;
  try { bc = new BroadcastChannel('wh_finance_sync'); } catch(_) {}

  function fmtDate(d) {
    try { return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}); }
    catch(_) { return d; }
  }

  function loadExpenses() {
    // 1. Try URL param (sent from dashboard "Share with Finance" button)
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('data');
    if (raw) {
      try { expenses = JSON.parse(atob(raw)).filter(e => !e.reimbursed); } catch(_) { expenses = []; }
      render(); return;
    }
    // 2. Try shared localStorage key (works when both pages open in same browser)
    try {
      const stored = localStorage.getItem('wh_expenses');
      if (stored) {
        expenses = JSON.parse(stored).filter(e => !e.reimbursed);
        document.getElementById('sync-banner').textContent = '\u2713 Live connection with dashboard detected — payments will sync instantly!';
        document.getElementById('sync-banner').style.display = 'block';
      }
    } catch(_) {}
    render();
  }

  function render() {
    const list = document.getElementById('expense-list');
    const totalPending = expenses.reduce((s,e) => s + Number(e.amount), 0);
    const paidAmt = expenses.filter(e => paidThisSession.has(e.id)).reduce((s,e) => s + Number(e.amount), 0);
    document.getElementById('sum-pending').textContent = '$' + totalPending.toFixed(2);
    document.getElementById('sum-paid').textContent    = '$' + paidAmt.toFixed(2);
    document.getElementById('sum-count').textContent   = expenses.length;
    document.getElementById('pending-badge').textContent = expenses.length + ' pending';

    if (!expenses.length) {
      list.innerHTML = '<div class="empty-state"><p style="font-size:15px;font-weight:600;margin-bottom:8px">No pending expenses</p><p style="font-size:13px">All caught up, or no data shared yet.</p></div>';
      return;
    }

    list.innerHTML = expenses.map(e => {
      const isPaid = paidThisSession.has(e.id);
      return '<div class="expense-card' + (isPaid ? ' paid' : '') + '">' +
        '<div class="exp-icon"><svg viewBox="0 0 16 16" fill="#FF3B7F"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 2c.55 0 1 .45 1 1v1h1.5a.5.5 0 010 1H7.25a.25.25 0 000 .5h1.5C9.99 6.5 11 7.51 11 8.75S9.99 11 8.75 11H8v.5a1 1 0 01-2 0V11H4.5a.5.5 0 010-1h2.25a.25.25 0 000-.5h-1.5C4.01 9.5 3 8.49 3 7.25S4.01 5 5.25 5H6v-.5c0-.55.45-1 1-1z"/></svg></div>' +
        '<div class="exp-info"><div class="exp-name">' + e.name + '</div><div class="exp-purpose">' + e.purpose + '</div><div class="exp-date">Requested: ' + fmtDate(e.date) + '</div></div>' +
        '<div class="exp-amount">$' + Number(e.amount).toFixed(2) + '<span>SGD</span></div>' +
        (isPaid
          ? '<div class="btn-paid"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M13.7 4.3l-7 7-1.4 1.4-1.4-1.4-2-2 1.4-1.4L5.3 10l6.3-6.3 1.4 1.3z"/></svg>Paid \u2713</div>'
          : '<button class="btn-pay" onclick="markPaid(' + e.id + ')">Mark as Paid</button>') +
        '</div>';
    }).join('');
  }

  function markPaid(id) {
    paidThisSession.add(id);

    // ---- Method 1: BroadcastChannel (instant, same browser, no page refresh needed) ----
    if (bc) {
      bc.postMessage({ type: 'MARK_PAID', id: id });
    }

    // ---- Method 2: Write directly to shared localStorage (same browser) ----
    try {
      const stored = localStorage.getItem('wh_expenses');
      if (stored) {
        const all = JSON.parse(stored);
        const exp = all.find(x => String(x.id) === String(id));
        if (exp) {
          exp.reimbursed = true;
          localStorage.setItem('wh_expenses', JSON.stringify(all));
          showToast('\u2713 Marked as paid — dashboard updated!');
        }
      } else {
        showToast('\u2713 Marked as paid!');
      }
    } catch(_) {
      showToast('\u2713 Marked as paid!');
    }

    render();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  loadExpenses();
</script>
</body>
</html>
